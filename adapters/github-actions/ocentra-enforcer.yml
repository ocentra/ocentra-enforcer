name: Ocentra Enforcer

on:
  pull_request:
  push:
    branches: [main]

jobs:
  enforcer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: rustfmt, clippy
      - name: Install Ocentra Enforcer
        run: npm install --global ocentra-enforcer
      - name: Route indexed rules
        run: ocentra-enforcer doctor --root . --workspace
      - name: Scan Rust policy
        run: ocentra-enforcer scan --root . --workspace
      - name: Run Rust cargo hard gate
        run: ocentra-enforcer cargo --root . --workspace
      - name: Route proof definitions
        run: ocentra-enforcer proof route --root . --files package.json Cargo.toml --json
      - name: Run proof harness smoke
        run: ocentra-enforcer proof run --root . --proof PROOF-COMMAND-GENERIC --run-id ci-proof-smoke --json -- node --version
      - name: Upload local proof artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ocentra-enforcer-proof-artifacts
          path: .enforce/proofs
          if-no-files-found: ignore
          retention-days: 7
