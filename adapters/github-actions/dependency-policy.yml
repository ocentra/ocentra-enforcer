name: Dependency Policy

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Ocentra Enforcer
        run: npm install --global ocentra-enforcer
      - name: Install dependency policy tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: Ocentra Enforcer dependency policy
        run: ocentra-enforcer cargo --root . --workspace
